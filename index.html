<!DOCTYPE html>
<html>
<head>
    <title>Knock Node Test</title>
    <style>
        body { background: #121212; color: #00ffcc; font-family: monospace; padding: 20px; }
        #msg-box { border: 1px solid #333; padding: 10px; margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>KNOCK_DIAGNOSTIC</h2>
    <input type="text" id="nodeIp" value="YOUR_PUBLIC_IP" placeholder="Node IP">
    <button id="connBtn">CONNECT</button>
    <div id="msg-box">Waiting for SDK...</div>

    <script type="module">
        // This specific path 'kaspa-wasm/web/kaspa-wasm' is the browser-compatible one
        import init, { RpcClient, Encoding } from 'https://unpkg.com/kaspa-wasm@0.13.0-rc.3/web/kaspa-wasm.js';

        async function run() {
            const msgBox = document.getElementById('msg-box');
            const btn = document.getElementById('connBtn');

            try {
                // Initialize the WASM
                await init();
                msgBox.innerText = "SDK Ready. Enter IP and click Connect.";
                console.log("Kaspa WASM Initialized");

                btn.addEventListener('click', async () => {
                    const ip = document.getElementById('nodeIp').value;
                    msgBox.innerText = "Connecting...";
                    
                    try {
                        const rpc = new RpcClient({
                            url: `ws://${ip}:17110`,
                            encoding: Encoding.Borsh,
                            networkId: "mainnet"
                        });
                        await rpc.connect();
                        const info = await rpc.getInfo();
                        msgBox.innerText = "SUCCESS! Blue Score: " + info.blueScore;
                    } catch (e) {
                        msgBox.innerText = "RPC Error: " + e.message;
                    }
                });
            } catch (e) {
                msgBox.innerText = "SDK Load Error: " + e.message;
            }
        }

        run();
    </script>
</body>
</html>
