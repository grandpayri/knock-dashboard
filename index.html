<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knock: Unified Node & Miner Dashboard</title>
    <style>
        :root { --ks-teal: #00ffcc; --ks-bg: #0a0a0a; --panel: #161616; }
        body { font-family: 'Courier New', monospace; background: var(--ks-bg); color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 8px; }
        h2 { color: var(--ks-teal); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        .stat { margin: 15px 0; }
        .label { color: #888; font-size: 0.8rem; text-transform: uppercase; }
        .value { font-size: 1.4rem; color: #fff; display: block; }
        .btn { width: 100%; padding: 10px; background: var(--ks-teal); border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #log { font-size: 0.7rem; color: #666; height: 100px; overflow-y: auto; background: #000; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card">
        <h2>NODE_RPC</h2>
        <input type="text" id="nodeIp" value="192.168.1.XX" style="width:70%; background:#000; color:#00ffcc; border:1px solid #444; padding:5px;">
        <button class="btn" onclick="connectNode()">CONNECT RPC</button>
        <div class="stat"><span class="label">Blue Score</span><span id="blueScore" class="value">---</span></div>
        <div class="stat"><span class="label">Sync Status</span><span id="syncStatus" class="value">---</span></div>
    </div>

    <div class="card">
        <h2>STRATUM_METRICS</h2>
        <input type="text" id="metricsPort" value="2114" style="width:40px; background:#000; color:#00ffcc; border:1px solid #444; padding:5px;">
        <button class="btn" onclick="fetchMetrics()">REFRESH STATS</button>
        <div class="stat"><span class="label">Wallet Balance</span><span id="mineBalance" class="value">0.00 KAS</span></div>
        <div class="stat"><span class="label">Total Shares</span><span id="mineShares" class="value">0</span></div>
    </div>
</div>

<div id="log" class="card">System logs initialized...</div>

<script type="module">
    // Using jsDelivr with a specific version to avoid redirect/CORS loops
    // This points specifically to the web-compatible build
    import init, { RpcClient, Encoding } from 'https://cdn.jsdelivr.net/npm/kaspa-wasm@0.14.1/web/kaspa-wasm.js';

    async function start() {
        const btn = document.getElementById('connBtn');
        const msgBox = document.getElementById('msg-box');

        try {
            // 1. Initialize the WASM framework
            // This fetches the .wasm file and compiles it in your browser
            await init(); 
            console.log("Kaspa WASM Initialized Successfully");

            btn.addEventListener('click', async () => {
                const ip = document.getElementById('nodeIp').value.trim();
                
                // UI feedback
                msgBox.style.display = "block";
                msgBox.className = "success";
                msgBox.innerText = "Attempting to reach your Pi...";
                btn.disabled = true;

                try {
                    // 2. Setup the RPC Client
                    const rpc = new RpcClient({
                        url: `ws://${ip}:17110`,
                        encoding: Encoding.Borsh,
                        networkId: "mainnet"
                    });

                    // 3. Connect
                    await rpc.connect();
                    
                    // 4. Fetch real data
                    const info = await rpc.getInfo();
                    
                    msgBox.className = "success";
                    msgBox.innerText = `SUCCESS!\nNode Version: ${info.serverVersion}\nBlue Score: ${info.blueScore}`;
                    btn.innerText = "CONNECTED";
                    
                } catch (err) {
                    console.error("Connection error:", err);
                    msgBox.className = "error";
                    msgBox.innerText = `CONNECTION FAILED: ${err.message}\n\nCheck: 1. Port 17110 is forwarded. 2. 'Insecure Content' is allowed in browser settings.`;
                    btn.disabled = false;
                    btn.innerText = "RETRY CONNECTION";
                }
            });
        } catch (e) {
            console.error("Framework failed to load:", e);
            msgBox.style.display = "block";
            msgBox.className = "error";
            msgBox.innerText = "Failed to load Kaspa SDK. Check console for details.";
        }
    }

    start();
</script>
</body>

</html>
