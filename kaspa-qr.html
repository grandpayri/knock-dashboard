<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaspa Wallet & KNS QR Code Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .bg-kaspa { background-color: #70C4B4; }
        .text-kaspa { color: #70C4B4; }
        .border-kaspa { border-color: #70C4B4; }
        .focus-kaspa:focus { border-color: #70C4B4; box-shadow: 0 0 0 2px rgba(112, 196, 180, 0.2); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur px-6 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-kaspa flex items-center justify-center font-bold text-slate-900">𐤋</div>
                <h1 class="text-xl font-bold tracking-tight">Kaspa <span class="text-kaspa">QR Gen</span></h1>
            </div>
            
            <div class="flex items-center space-x-2 bg-slate-950 px-3 py-1 rounded-xl border border-slate-800 text-xs">
                <span class="text-slate-400">Version <span id="version-display" class="font-mono text-kaspa font-semibold">9</span></span>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-800/60 border border-slate-700/60 p-6 rounded-2xl shadow-xl w-full max-w-md backdrop-blur-md">
            
            <h2 class="text-lg font-semibold text-white mb-2">Generate Address QR</h2>
            <p class="text-sm text-slate-400 mb-6">Enter a standard address or a live <span class="text-kaspa font-medium">.kas KNS domain</span>.</p>

            <div class="space-y-5">
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="address" class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Target Input</label>
                        <span id="resolution-status" class="text-xs text-kaspa font-medium hidden">Resolving KNS...</span>
                    </div>
                    <textarea 
                        id="address" 
                        rows="2"
                        class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus-kaspa transition resize-none"
                        placeholder="kaspa:qqxxxxxxxx... or name.kas"
                    ></textarea>
                    <p id="error-msg" class="text-xs text-rose-400 mt-1.5 hidden"></p>
                </div>

                <div id="qrcode-secret" class="hidden"></div>

                <div class="flex flex-col items-center justify-center py-4 bg-slate-950/40 rounded-xl border border-slate-800">
                    <div class="bg-white p-3 rounded-lg shadow-inner min-h-[184px] min-w-[184px] flex items-center justify-center">
                        <canvas id="qr-canvas" width="160" height="160" class="hidden"></canvas>
                        <div id="qr-placeholder" class="text-xs text-slate-500 italic text-center px-4">Waiting for valid address or KNS domain...</div>
                    </div>
                    <div id="raw-uri" class="text-sm text-slate-200 font-mono font-bold mt-4 px-2 tracking-wide text-center selection:bg-kaspa/30"></div>
                </div>

                <button 
                    id="download-btn"
                    disabled
                    class="w-full py-3 bg-slate-700 text-slate-400 font-medium rounded-xl transition shadow-lg cursor-pointer flex justify-center items-center gap-2"
                >
                    Save Branded QR Code
                </button>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-slate-500 border-t border-slate-800 bg-slate-950/20">
        <p>Production Environment • Hybrid Script Pipeline Architecture</p>
    </footer>

    <script>
        (function() {
            // Hardcoded internally to track version history delivery across deployments
            const DEPLOYED_VERSION = "9";
            
            // DOM Elements
            const addressInput = document.getElementById('address');
            const errorMsg = document.getElementById('error-msg');
            const statusLabel = document.getElementById('resolution-status');
            const secretQrContainer = document.getElementById('qrcode-secret');
            const qrCanvas = document.getElementById('qr-canvas');
            const qrPlaceholder = document.getElementById('qr-placeholder');
            const rawUriDisplay = document.getElementById('raw-uri');
            const downloadBtn = document.getElementById('download-btn');
            const versionDisplay = document.getElementById('version-display');

            // Force internal state layout reflection instantly on load
            versionDisplay.textContent = DEPLOYED_VERSION;

            let typingDebounceTimeout = null;

            function evaluateInput() {
                clearTimeout(typingDebounceTimeout);
                const input = addressInput.value.trim().toLowerCase();

                if (!input) {
                    resetDisplay();
                    errorMsg.classList.add('hidden');
                    statusLabel.classList.add('hidden');
                    return;
                }

                if (input.endsWith('.kas')) {
                    statusLabel.textContent = "Waiting to type...";
                    statusLabel.classList.remove('text-rose-400');
                    statusLabel.classList.add('text-kaspa');
                    statusLabel.classList.remove('hidden');
                    
                    typingDebounceTimeout = setTimeout(() => {
                        resolveKNSName(input);
                    }, 500);
                } else {
                    statusLabel.classList.add('hidden');
                    if (input.startsWith('kaspa:') || input.startsWith('kaspatest:')) {
                        errorMsg.classList.add('hidden');
                        generateQR(input);
                    } else {
                        errorMsg.textContent = "Input must end in '.kas' or start with 'kaspa:' / 'kaspatest:'.";
                        errorMsg.classList.remove('hidden');
                        resetDisplay();
                    }
                }
            }

            // --- Robust Anti-CORS Hybrid Pipeline Resolver ---
            async function resolveKNSName(domainName) {
                statusLabel.textContent = "Querying Indexer...";
                errorMsg.classList.add('hidden');

                try {
                    const response = await fetch(`https://corsproxy.
