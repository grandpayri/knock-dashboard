<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaspa Wallet & KNS QR Code Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .bg-kaspa { background-color: #70C4B4; }
        .text-kaspa { color: #70C4B4; }
        .border-kaspa { border-color: #70C4B4; }
        .focus-kaspa:focus { border-color: #70C4B4; box-shadow: 0 0 0 2px rgba(112, 196, 180, 0.2); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur px-6 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-kaspa flex items-center justify-center font-bold text-slate-900">𐤋</div>
                <h1 class="text-xl font-bold tracking-tight">Kaspa <span class="text-kaspa">QR Gen</span></h1>
            </div>
            
            <div class="flex items-center space-x-2 bg-slate-950 px-3 py-1 rounded-xl border border-slate-800 text-xs">
                <span class="text-slate-400">Version <span id="version-display" class="font-mono text-kaspa font-semibold">10</span></span>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-800/60 border border-slate-700/60 p-6 rounded-2xl shadow-xl w-full max-w-md backdrop-blur-md">
            
            <h2 class="text-lg font-semibold text-white mb-2">Generate Address QR</h2>
            <p class="text-sm text-slate-400 mb-6">Enter a standard address or a live <span class="text-kaspa font-medium">.kas KNS domain</span>.</p>

            <div class="space-y-5">
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="address" class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Target Input</label>
                        <span id="resolution-status" class="text-xs text-kaspa font-medium hidden">Resolving KNS...</span>
                    </div>
                    <textarea 
                        id="address" 
                        rows="2"
                        class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus-kaspa transition resize-none"
                        placeholder="kaspa:qqxxxxxxxx... or name.kas"
                    ></textarea>
                    <p id="error-msg" class="text-xs text-rose-400 mt-1.5 hidden"></p>
                </div>

                <div id="qrcode-secret" class="hidden"></div>

                <div class="flex flex-col items-center justify-center py-4 bg-slate-950/40 rounded-xl border border-slate-800">
                    <div class="bg-white p-3 rounded-lg shadow-inner min-h-[184px] min-w-[184px] flex items-center justify-center">
                        <canvas id="qr-canvas" width="160" height="160" class="hidden"></canvas>
                        <div id="qr-placeholder" class="text-xs text-slate-500 italic text-center px-4">Waiting for valid address or KNS domain...</div>
                    </div>
                    <div id="raw-uri" class="text-sm text-slate-200 font-mono font-bold mt-4 px-2 tracking-wide text-center selection:bg-kaspa/30"></div>
                </div>

                <button 
                    id="download-btn"
                    disabled
                    class="w-full py-3 bg-slate-700 text-slate-400 font-medium rounded-xl transition shadow-lg cursor-pointer flex justify-center items-center gap-2"
                >
                    Save Branded QR Code
                </button>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-slate-500 border-t border-slate-800 bg-slate-950/20">
        <p>Production Environment • Hybrid Script Pipeline Architecture</p>
    </footer>

    <script>
        (function() {
            // Hardcoded internally to track version history delivery across deployments
            const DEPLOYED_VERSION = "10";
            
            // DOM Elements
            const addressInput = document.getElementById('address');
            const errorMsg = document.getElementById('error-msg');
            const statusLabel = document.getElementById('resolution-status');
            const secretQrContainer = document.getElementById('qrcode-secret');
            const qrCanvas = document.getElementById('qr-canvas');
            const qrPlaceholder = document.getElementById('qr-placeholder');
            const rawUriDisplay = document.getElementById('raw-uri');
            const downloadBtn = document.getElementById('download-btn');
            const versionDisplay = document.getElementById('version-display');

            // Force internal state layout reflection instantly on load
            versionDisplay.textContent = DEPLOYED_VERSION;

            // Pre-instantiate and pre-cache the official Kaspa asset inside the memory layer to avoid layout drift
            const logoAsset = new Image();
            // Using a permissive proxy wrap ensures browser engines don't taint the canvas during export routines
            logoAsset.src = "https://corsproxy.io/?" + encodeURIComponent("https://kaspa.org/_next/image?url=%2Fkaspa-logo-dark.svg&w=256&q=75");
            logoAsset.crossOrigin = "anonymous"; 

            let typingDebounceTimeout = null;

            function evaluateInput() {
                clearTimeout(typingDebounceTimeout);
                const input = addressInput.value.trim().toLowerCase();

                if (!input) {
                    resetDisplay();
                    errorMsg.classList.add('hidden');
                    statusLabel.classList.add('hidden');
                    return;
                }

                if (input.endsWith('.kas')) {
                    statusLabel.textContent = "Waiting to type...";
                    statusLabel.classList.remove('text-rose-400');
                    statusLabel.classList.add('text-kaspa');
                    statusLabel.classList.remove('hidden');
                    
                    typingDebounceTimeout = setTimeout(() => {
                        resolveKNSName(input);
                    }, 500);
                } else {
                    statusLabel.classList.add('hidden');
                    if (input.startsWith('kaspa:') || input.startsWith('kaspatest:')) {
                        errorMsg.classList.add('hidden');
                        generateQR(input);
                    } else {
                        errorMsg.textContent = "Input must end in '.kas' or start with 'kaspa:' / 'kaspatest:'.";
                        errorMsg.classList.remove('hidden');
                        resetDisplay();
                    }
                }
            }

            // --- Robust Anti-CORS Hybrid Pipeline Resolver ---
            async function resolveKNSName(domainName) {
                statusLabel.textContent = "Querying Indexer...";
                errorMsg.classList.add('hidden');

                const targetUrl = `https://api.knsdomains.org/mainnet/api/v1/${encodeURIComponent(domainName)}/owner`;

                try {
                    const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
                    if (!response.ok) throw new Error("Proxy connection dropped");
                    
                    const payload = await response.json();
                    
                    if (payload && payload.success === true && payload.data && payload.data.owner) {
                        statusLabel.textContent = "Resolved ✓";
                        generateQR(payload.data.owner);
                        return;
                    }
                } catch (e) {
                    console.log("Primary fetch blocked or timed out, executing clean failover route...");
                }

                try {
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                    if (!response.ok) throw new Error("Failover route offline");
                    
                    const wrapper = await response.json();
                    if (!wrapper.contents) throw new Error("Empty wrapper");
                    
                    const payload = JSON.parse(wrapper.contents);
                    if (payload && payload.success === true && payload.data && payload.data.owner) {
                        statusLabel.textContent = "Resolved ✓";
                        generateQR(payload.data.owner);
                        return;
                    }
                } catch (err) {
                    statusLabel.textContent = "KNS Failed";
                    statusLabel.classList.remove('text-kaspa');
                    statusLabel.classList.add('text-rose-400');
                    
                    errorMsg.textContent = "CORS block detected. If the domain is valid, wait a moment and try re-typing.";
                    errorMsg.classList.remove('hidden');
                    resetDisplay();
                }
            }

            function truncateAddress(address) {
                if (!address) return "";
                const prefix = address.startsWith("kaspatest:") ? "kaspatest:" : "kaspa:";
                const cleanAddress = address.replace(prefix, "");
                
                if (cleanAddress.length <= 12) return address;

                const start = cleanAddress.substring(0, 7);
                const end = cleanAddress.substring(cleanAddress.length - 6);
                
                return `${prefix}${start}...${end}`;
            }

            // --- Direct-Draw Canvas Core ---
            function generateQR(qrPayload) {
                rawUriDisplay.textContent = truncateAddress(qrPayload);
                rawUriDisplay.title = qrPayload;

                secretQrContainer.innerHTML = ""; 
                new QRCode(secretQrContainer, {
                    text: qrPayload,
                    width: 160,
                    height: 160,
                    colorDark: "#020617",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });

                let checkAttempts = 0;
                const extractAndDrawLoop = setInterval(() => {
                    const generatedImg = secretQrContainer.querySelector('img');
                    checkAttempts++;

                    if ((generatedImg && generatedImg.src) || checkAttempts > 20) {
                        clearInterval(extractAndDrawLoop);
                        if (generatedImg && generatedImg.src) {
                            drawBrandedCanvas(generatedImg);
                        }
                    }
                }, 25);
            }

            function drawBrandedCanvas(imgElement) {
                const ctx = qrCanvas.getContext('2d');
                ctx.clearRect(0, 0, 160, 160);
                ctx.drawImage(imgElement, 0, 0, 160, 160);

                const center = 160 / 2;
                const badgeSize = 38; 
                const radius = 6;     

                // Draw protective solid white padding container background square
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.moveTo(center - badgeSize/2 + radius, center - badgeSize/2);
                ctx.lineTo(center + badgeSize/2 - radius, center - badgeSize/2);
                ctx.quadraticCurveTo(center + badgeSize/2, center - badgeSize/2, center + badgeSize/2, center - badgeSize/2 + radius);
                ctx.lineTo(center + badgeSize/2, center + badgeSize/2 - radius);
                ctx.quadraticCurveTo(center + badgeSize/2, center + badgeSize/2, center + badgeSize/2 - radius, center + badgeSize/2);
                ctx.lineTo(center - badgeSize/2 + radius, center + badgeSize/2);
                ctx.quadraticCurveTo(center - badgeSize/2, center + badgeSize/2, center - badgeSize/2, center + badgeSize/2 - radius);
                ctx.lineTo(center - badgeSize/2, center - badgeSize/2 + radius);
                ctx.quadraticCurveTo(center - badgeSize/2, center - badgeSize/2, center - badgeSize/2 + radius, center - badgeSize/2);
                ctx.closePath();
                ctx.fill();

                // Draw official vector image branding element over the center coordinates smoothly
                try {
                    // Sizing bounding frame dimensions meticulously inside standard limits
                    const logoDimensions = 28; 
                    ctx.drawImage(
                        logoAsset, 
                        center - logoDimensions / 2, 
                        center - logoDimensions / 2, 
                        logoDimensions, 
                        logoDimensions
                    );
                } catch (e) {
                    // Graceful fallback to local styling rules if remote asset is temporarily offline
                    const innerCircleRadius = 14;
                    ctx.fillStyle = "#70C4B4"; 
                    ctx.beginPath();
                    ctx.arc(center, center, innerCircleRadius, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.fillStyle = "#0f172a"; 
                    ctx.font = "bold 18px sans-serif";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText("𐤋", center, center + 1);
                }

                qrPlaceholder.classList.add('hidden');
                qrCanvas.classList.remove('hidden');
                setBtnDisabled(false);
            }

            function resetDisplay() {
                qrPlaceholder.classList.remove('hidden');
                qrCanvas.classList.add('hidden');
                rawUriDisplay.textContent = "";
                setBtnDisabled(true);
            }

            function setBtnDisabled(isDisabled) {
                downloadBtn.disabled = isDisabled;
                if (isDisabled) {
                    downloadBtn.classList.remove('bg-kaspa', 'hover:bg-[#5bb3a2]', 'text-slate-900');
                    downloadBtn.classList.add('bg-slate-700', 'text-slate-400');
                } else {
                    downloadBtn.classList.remove('bg-slate-700', 'text-slate-400');
                    downloadBtn.classList.add('bg-kaspa', 'hover:bg-[#5bb3a2]', 'text-slate-900');
                }
            }

            downloadBtn.addEventListener('click', () => {
                if (qrCanvas.classList.contains('hidden')) return;
                
                const dataUrl = qrCanvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = `kaspa-qr-v${DEPLOYED_VERSION}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });

            addressInput.addEventListener('input', evaluateInput);
        })();
    </script>
</body>
</html>
