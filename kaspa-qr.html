<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaspa Wallet QR Code Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .bg-kaspa { background-color: #70C4B4; }
        .text-kaspa { color: #70C4B4; }
        .border-kaspa { border-color: #70C4B4; }
        .focus-kaspa:focus { border-color: #70C4B4; box-shadow: 0 0 0 2px rgba(112, 196, 180, 0.2); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur px-6 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-kaspa flex items-center justify-center font-bold text-slate-900">𐤋</div>
                <h1 class="text-xl font-bold tracking-tight">Kaspa <span class="text-kaspa">QR Gen</span></h1>
            </div>
            
            <div class="flex items-center space-x-2 bg-slate-950 px-3 py-1 rounded-xl border border-slate-800 text-xs">
                <span class="text-slate-400">Version <span id="version-display">1</span></span>
                <button id="increment-btn" class="text-kaspa hover:text-white font-bold px-1 transition cursor-pointer" title="Increment Version Step">+</button>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-800/60 border border-slate-700/60 p-6 rounded-2xl shadow-xl w-full max-w-md backdrop-blur-md">
            
            <h2 class="text-lg font-semibold text-white mb-2">Generate Address QR</h2>
            <p class="text-sm text-slate-400 mb-6">Enter your mainnet or testnet address to generate a branded scannable payload.</p>

            <div class="space-y-5">
                <div>
                    <label for="address" class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Kaspa Address</label>
                    <textarea 
                        id="address" 
                        rows="3"
                        class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus-kaspa transition resize-none"
                        placeholder="kaspa:qqxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
                    ></textarea>
                    <p id="error-msg" class="text-xs text-rose-400 mt-1.5 hidden"></p>
                </div>

                <div id="qrcode-secret" class="hidden"></div>

                <div class="flex flex-col items-center justify-center py-4 bg-slate-950/40 rounded-xl border border-slate-800">
                    <div class="bg-white p-3 rounded-lg shadow-inner min-h-[184px] min-w-[184px] flex items-center justify-center">
                        <canvas id="qr-canvas" width="160" height="160" class="hidden"></canvas>
                        <div id="qr-placeholder" class="text-xs text-slate-500 italic">Waiting for valid address...</div>
                    </div>
                    <div id="raw-uri" class="text-[10px] text-slate-500 font-mono mt-3 px-4 truncate max-w-xs text-center"></div>
                </div>

                <button 
                    id="download-btn"
                    disabled
                    class="w-full py-3 bg-slate-700 text-slate-400 font-medium rounded-xl transition shadow-lg cursor-pointer flex justify-center items-center gap-2"
                >
                    Save Branded QR Code
                </button>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-slate-500 border-t border-slate-800 bg-slate-950/20">
        <p>Your inputs never touch a server. Secure, ephemeral browser-only cryptography environment.</p>
    </footer>

    <script>
        (function() {
            // DOM Elements
            const addressInput = document.getElementById('address');
            const errorMsg = document.getElementById('error-msg');
            const secretQrContainer = document.getElementById('qrcode-secret');
            const qrCanvas = document.getElementById('qr-canvas');
            const qrPlaceholder = document.getElementById('qr-placeholder');
            const rawUriDisplay = document.getElementById('raw-uri');
            const downloadBtn = document.getElementById('download-btn');
            const versionDisplay = document.getElementById('version-display');
            const incrementBtn = document.getElementById('increment-btn');

            // --- Simplified Integer Version Handling ---
            let currentVersion = parseInt(localStorage.getItem('kaspa_simple_version') || '1', 10);
            versionDisplay.textContent = currentVersion;

            incrementBtn.addEventListener('click', (e) => {
                e.preventDefault();
                currentVersion += 1;
                localStorage.setItem('kaspa_simple_version', currentVersion);
                versionDisplay.textContent = currentVersion;
            });

            // --- Bulletproof Direct-Draw QR Engine ---
            function updateQR() {
                const qrPayload = addressInput.value.trim();

                // Validation reset rules
                if (!qrPayload) {
                    resetDisplay();
                    return;
                }

                if (!qrPayload.startsWith('kaspa:') && !qrPayload.startsWith('kaspatest:')) {
                    errorMsg.textContent = "Address must begin with 'kaspa:' or 'kaspatest:' scheme prefix.";
                    errorMsg.classList.remove('hidden');
                    resetDisplay();
                    return;
                }

                errorMsg.classList.add('hidden');
                rawUriDisplay.textContent = qrPayload;
                rawUriDisplay.title = qrPayload;

                // 1. Wipe and re-instantiate base generation inside hidden scratch buffer
                secretQrContainer.innerHTML = ""; 
                
                const qrEngine = new QRCode(secretQrContainer, {
                    text: qrPayload,
                    width: 160,
                    height: 160,
                    colorDark: "#020617",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H // Uses High Error Correction to protect tracking against center logos
                });

                // 2. Extract image via dynamic loop checks to handle slower devices safely
                let checkAttempts = 0;
                const extractAndDrawLoop = setInterval(() => {
                    const generatedImg = secretQrContainer.querySelector('img');
                    checkAttempts++;

                    // If image is ready OR if we timed out, execute draw routines
                    if (generatedImg && generatedImg.src || checkAttempts > 20) {
                        clearInterval(extractAndDrawLoop);
                        
                        if (generatedImg && generatedImg.src) {
                            drawBrandedCanvas(generatedImg);
                        }
                    }
                }, 25);
            }

            function drawBrandedCanvas(imgElement) {
                const ctx = qrCanvas.getContext('2d');
                ctx.clearRect(0, 0, 160, 160);
                
                // Print basic barcode pattern matrix across target frame
                ctx.drawImage(imgElement, 0, 0, 160, 160);

                // --- Render Centered Kaspa Identity Badge ---
                const center = 160 / 2;
                const badgeSize = 38; 
                const radius = 6;     

                // Draw protective solid white padding container square
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.moveTo(center - badgeSize/2 + radius, center - badgeSize/2);
                ctx.lineTo(center + badgeSize/2 - radius, center - badgeSize/2);
                ctx.quadraticCurveTo(center + badgeSize/2, center - badgeSize/2, center + badgeSize/2, center - badgeSize/2 + radius);
                ctx.lineTo(center + badgeSize/2, center + badgeSize/2 - radius);
                ctx.quadraticCurveTo(center + badgeSize/2, center + badgeSize/2, center + badgeSize/2 - radius, center + badgeSize/2);
                ctx.lineTo(center - badgeSize/2 + radius, center + badgeSize/2);
                ctx.quadraticCurveTo(center - badgeSize/2, center + badgeSize/2, center - badgeSize/2, center + badgeSize/2 - radius);
                ctx.lineTo(center - badgeSize/2, center - badgeSize/2 + radius);
                ctx.quadraticCurveTo(center - badgeSize/2, center - badgeSize/2, center - badgeSize/2 + radius, center - badgeSize/2);
                ctx.closePath();
                ctx.fill();

                // Draw inner core Kaspa branding color badge plate circles
                const innerCircleRadius = 14;
                ctx.fillStyle = "#70C4B4"; 
                ctx.beginPath();
                ctx.arc(center, center, innerCircleRadius, 0, 2 * Math.PI);
                ctx.fill();

                // Stamp Kaspa script Unicode icon safely centered on top
                ctx.fillStyle = "#0f172a"; 
                ctx.font = "bold 18px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("𐤋", center, center + 1); 

                // Unhide the UI elements safely
                qrPlaceholder.classList.add('hidden');
                qrCanvas.classList.remove('hidden');
                setBtnDisabled(false);
            }

            function resetDisplay() {
                qrPlaceholder.classList.remove('hidden');
                qrCanvas.classList.add('hidden');
                rawUriDisplay.textContent = "";
                setBtnDisabled(true);
            }

            function setBtnDisabled(isDisabled) {
                downloadBtn.disabled = isDisabled;
                if (isDisabled) {
                    downloadBtn.classList.remove('bg-kaspa', 'hover:bg-[#5bb3a2]', 'text-slate-900');
                    downloadBtn.classList.add('bg-slate-700', 'text-slate-400');
                } else {
                    downloadBtn.classList.remove('bg-slate-700', 'text-slate-400');
                    downloadBtn.classList.add('bg-kaspa', 'hover:bg-[#5bb3a2]', 'text-slate-900');
                }
            }

            // Export logic handling native image data transfers
            downloadBtn.addEventListener('click', () => {
                if (qrCanvas.classList.contains('hidden')) return;
                
                const dataUrl = qrCanvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = `kaspa-qr-v${currentVersion}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });

            // Watch for input configurations
            addressInput.addEventListener('input', updateQR);
        })();
    </script>
</body>
</html>
