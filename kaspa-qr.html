<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaspa KNS & Address QR Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .kaspa-glow {
            box-shadow: 0 0 20px rgba(112, 227, 212, 0.15);
        }
        .spinner {
            border-top-color: #70e3d4;
            animation: spinner 0.6s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-slate-100">

    <div class="w-full max-w-md bg-slate-900/80 border border-slate-800 rounded-2xl p-6 backdrop-blur-xl kaspa-glow">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-[#70e3d4] to-[#4fa89e]">
                KASPA QR GENERATOR
            </h1>
            <p class="text-xs text-slate-400 mt-1">Supports addresses and KNS (.kas) domains</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">
                    Wallet Address or KNS Domain
                </label>
                <input 
                    type="text" 
                    id="kasInput" 
                    placeholder="e.g., name.kas or kaspa:qq..." 
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-[#70e3d4] text-sm font-mono text-slate-200 transition-colors"
                />
            </div>

            <button 
                id="generateBtn"
                onclick="handleGeneration()" 
                class="w-full flex items-center justify-center py-3 bg-gradient-to-r from-[#70e3d4] to-[#4fa89e] text-slate-950 font-bold rounded-xl hover:opacity-90 transition-opacity uppercase tracking-wider text-sm"
            >
                <span id="btnText">Generate QR Code</span>
                <div id="btnSpinner" class="spinner ease-linear rounded-full border-2 border-slate-950 h-4 w-4 ml-2 hidden"></div>
            </button>
        </div>

        <div id="metaContainer" class="mt-4 p-3 bg-slate-950 border border-slate-800 rounded-xl text-center hidden">
            <span class="block text-[10px] uppercase tracking-wider text-slate-400">Resolved Address</span>
            <span id="resolvedAddress" class="text-xs font-mono text-[#70e3d4] break-all block mt-1"></span>
        </div>

        <div class="mt-6 flex flex-col items-center justify-center">
            <div id="qrcode" class="hidden"></div>
            
            <div class="p-4 bg-white rounded-2xl shadow-xl border-4 border-[#70e3d4]/30 hidden" id="canvasContainer">
                <canvas id="fancyCanvas" width="300" height="300" class="rounded-lg"></canvas>
            </div>
            
            <button 
                id="downloadBtn" 
                onclick="downloadQR()" 
                class="mt-4 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-xs font-medium rounded-lg transition-colors hidden"
            >
                Download PNG
            </button>
        </div>
    </div>

    <script>
        // Clean vector asset for the Kaspa logo icon overlay
        const kaspaLogoSrc = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><circle cx="50" cy="50" r="50" fill="%2370e3d4"/><path d="M25 50 L42 30 L55 30 L38 50 L55 70 L42 70 Z M48 50 L65 30 L78 30 L61 50 L78 70 L65 70 Z" fill="%230f172a"/></svg>`;

        async function handleGeneration() {
            let inputData = document.getElementById('kasInput').value.trim();
            if (!inputData) {
                alert('Please enter a Kaspa address or KNS domain.');
                return;
            }

            if (typeof QRCode === 'undefined') {
                alert('Error: The QR Code engine library failed to load. Please check connection.');
                return;
            }

            setLoading(true);
            hideOutputs();

            // Intercept .kas domains
            if (inputData.toLowerCase().endsWith('.kas')) {
                try {
                    // Normalize inputs for standard lookup formats
                    let domainName = inputData.toLowerCase();
                    if (!domainName.endsWith('.kas')) domainName += '.kas';
                    
                    // Directly query the public gateway indexer which permits all external web connections
                    const response = await fetch(`https://api.kaspa.org/kns/domain/${domainName}`);
                    
                    if (!response.ok) {
                        throw new Error('This domain name was not found or has expired on-chain.');
                    }
                    
                    const data = await response.json();
                    
                    // Route out the wallet payload mapping
                    if (data && data.address) {
                        inputData = data.address;
                        document.getElementById('resolvedAddress').innerText = inputData;
                        document.getElementById('metaContainer').classList.remove('hidden');
                    } else if (data && data.owner) {
                        inputData = data.owner;
                        document.getElementById('resolvedAddress').innerText = inputData;
                        document.getElementById('metaContainer').classList.remove('hidden');
                    } else {
                        throw new Error(`Domain "${domainName}" found, but no target payment address is mapped.`);
                    }
                } catch (error) {
                    alert(`KNS Resolver Error: ${error.message}`);
                    setLoading(false);
                    return;
                }
            }

            generateFancyQR(inputData);
        }

        function generateFancyQR(walletAddress) {
            try {
                const qrDiv = document.getElementById('qrcode');
                const canvas = document.getElementById('fancyCanvas');
                const ctx = canvas.getContext('2d');
                
                qrDiv.innerHTML = "";
                
                const qr = new QRCode(qrDiv, {
                    text: walletAddress,
                    width: 300,
                    height: 300,
                    colorDark: "#0f172a",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H 
                });

                // Set short buffer timeout to guarantee standard output processing completion
                setTimeout(() => {
                    const qrImg = qrDiv.querySelector('img');
                    if (!qrImg) {
                        setLoading(false);
                        return;
                    }

                    ctx.drawImage(qrImg, 0, 0, 300, 300);

                    const logo = new Image();
                    logo.src = kaspaLogoSrc;
                    logo.onload = function() {
                        const logoSize = 64; 
                        const logoX = (canvas.width - logoSize) / 2;
                        const logoY = (canvas.height - logoSize) / 2;

                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath();
                        ctx.arc(canvas.width / 2, canvas.height / 2, (logoSize / 2) + 4, 0, 2 * Math.PI);
                        ctx.fill();

                        ctx.drawImage(logo, logoX, logoY, logoSize, logoSize);
                        
                        document.getElementById('canvasContainer').classList.remove('hidden');
                        document.getElementById('downloadBtn').classList.remove('hidden');
                        setLoading(false);
                    };
                }, 200);
            } catch (e) {
                alert(`Matrix Compiler Failure: ${e.message}`);
                setLoading(false);
            }
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('generateBtn');
            const spinner = document.getElementById('btnSpinner');
            const text = document.getElementById('btnText');

            if (isLoading) {
                btn.disabled = true;
                spinner.classList.remove('hidden');
                text.innerText = "Resolving Blockchain Data...";
            } else {
                btn.disabled = false;
                spinner.classList.add('hidden');
                text.innerText = "Generate QR Code";
            }
        }

        function hideOutputs() {
            document.getElementById('canvasContainer').classList.add('hidden');
            document.getElementById('downloadBtn').classList.add('hidden');
            document.getElementById('metaContainer').classList.add('hidden');
        }

        function downloadQR() {
            const canvas = document.getElementById('fancyCanvas');
            const link = document.createElement('a');
            link.download = 'kaspa-fancy-qr.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
