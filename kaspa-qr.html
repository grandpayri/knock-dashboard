<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaspa Wallet QR Code Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .bg-kaspa { background-color: #70C4B4; }
        .text-kaspa { color: #70C4B4; }
        .border-kaspa { border-color: #70C4B4; }
        .focus-kaspa:focus { border-color: #70C4B4; box-shadow: 0 0 0 2px rgba(112, 196, 180, 0.2); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur px-6 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-kaspa flex items-center justify-center font-bold text-slate-900">𐤋</div>
                <h1 class="text-xl font-bold tracking-tight">Kaspa <span class="text-kaspa">QR Gen</span></h1>
            </div>
            
            <div class="flex items-center space-x-2 bg-slate-950 px-3 py-1 rounded-xl border border-slate-800 text-xs">
                <span class="text-slate-400">v<span id="version-display">1.0.0</span></span>
                <button id="increment-btn" class="text-kaspa hover:text-white font-bold px-1 transition cursor-pointer" title="Increment Patch Version">+</button>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-800/60 border border-slate-700/60 p-6 rounded-2xl shadow-xl w-full max-w-md backdrop-blur-md">
            
            <h2 class="text-lg font-semibold text-white mb-2">Generate Address QR</h2>
            <p class="text-sm text-slate-400 mb-6">Enter your mainnet or testnet address to create a scannable payment target.</p>

            <div class="space-y-5">
                <div>
                    <label for="address" class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Kaspa Address</label>
                    <textarea 
                        id="address" 
                        rows="3"
                        class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus-kaspa transition resize-none"
                        placeholder="kaspa:qqxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
                    ></textarea>
                    <p id="error-msg" class="text-xs text-rose-400 mt-1.5 hidden"></p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="amount" class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Amount (Optional)</label>
                        <input 
                            type="number" 
                            id="amount" 
                            step="any"
                            min="0"
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus-kaspa transition"
                            placeholder="e.g. 150"
                        />
                    </div>
                    <div>
                        <label for="label" class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Notes/Label (Optional)</label>
                        <input 
                            type="text" 
                            id="label" 
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus-kaspa transition"
                            placeholder="e.g. Donation"
                        />
                    </div>
                </div>

                <div class="flex flex-col items-center justify-center py-4 bg-slate-950/40 rounded-xl border border-slate-800">
                    <div id="qrcode" class="bg-white p-3 rounded-lg shadow-inner min-h-[152px] flex items-center justify-center">
                        <span class="text-xs text-slate-500 italic">Waiting for valid address...</span>
                    </div>
                    <div id="raw-uri" class="text-[10px] text-slate-500 font-mono mt-3 px-4 truncate max-w-xs text-center"></div>
                </div>

                <button 
                    id="download-btn"
                    disabled
                    class="w-full py-3 bg-slate-700 text-slate-900 font-medium rounded-xl transition shadow-lg cursor-pointer flex justify-center items-center gap-2"
                >
                    Save QR Code Image
                </button>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-slate-500 border-t border-slate-800 bg-slate-950/20">
        <p>Your inputs never touch a server. Secure, ephemeral browser-only cryptography environment.</p>
    </footer>

    <script>
        (function() {
            // DOM Elements
            const addressInput = document.getElementById('address');
            const amountInput = document.getElementById('amount');
            const labelInput = document.getElementById('label');
            const errorMsg = document.getElementById('error-msg');
            const qrContainer = document.getElementById('qrcode');
            const rawUriDisplay = document.getElementById('raw-uri');
            const downloadBtn = document.getElementById('download-btn');
            const versionDisplay = document.getElementById('version-display');
            const incrementBtn = document.getElementById('increment-btn');

            let qrInstance = null;

            // --- Version Incrementer Logic ---
            // Pull persistent version cache out of localStorage, default to 1.0.0
            let currentVersion = localStorage.getItem('kaspa_app_version') || '1.0.0';
            versionDisplay.textContent = currentVersion;

            incrementBtn.addEventListener('click', (e) => {
                e.preventDefault();
                let parts = currentVersion.split('.').map(Number);
                
                // Safely increment patch version (1.0.0 -> 1.0.1)
                parts[2] += 1; 
                currentVersion = parts.join('.');
                
                // Persist state
                localStorage.setItem('kaspa_app_version', currentVersion);
                
                // Update text node strictly without creating new layout markup mutations
                versionDisplay.textContent = currentVersion;
            });

            // --- QR Generator Logic ---
            function updateQR() {
                const rawAddress = addressInput.value.trim();
                const amount = amountInput.value.trim();
                const label = labelInput.value.trim();

                if (!rawAddress) {
                    qrContainer.innerHTML = '<span class="text-xs text-slate-500 italic">Waiting for valid address...</span>';
                    rawUriDisplay.textContent = "";
                    errorMsg.classList.add('hidden');
                    setBtnDisabled(true);
                    return;
                }

                if (!rawAddress.startsWith('kaspa:') && !rawAddress.startsWith('kaspatest:')) {
                    errorMsg.textContent = "Address must begin with 'kaspa:' or 'kaspatest:' scheme prefix.";
                    errorMsg.classList.remove('hidden');
                    qrContainer.innerHTML = '<span class="text-xs text-rose-400 font-medium">Invalid Address Format</span>';
                    rawUriDisplay.textContent = "";
                    setBtnDisabled(true);
                    return;
                }

                errorMsg.classList.add('hidden');

                let qrPayload = rawAddress;
                const params = [];
                
                if (amount && parseFloat(amount) > 0) {
                    params.push(`amount=${encodeURIComponent(amount)}`);
                }
                if (label) {
                    params.push(`label=${encodeURIComponent(label)}`);
                }
                if (params.length > 0) {
                    qrPayload += `?${params.join('&')}`;
                }

                rawUriDisplay.textContent = qrPayload;
                rawUriDisplay.title = qrPayload;

                qrContainer.innerHTML = ""; 
                qrInstance = new QRCode(qrContainer, {
                    text: qrPayload,
                    width: 160,
                    height: 160,
                    colorDark: "#020617",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });

                setBtnDisabled(false);
            }

            function setBtnDisabled(isDisabled) {
                downloadBtn.disabled = isDisabled;
                if (isDisabled) {
                    downloadBtn.classList.remove('bg-kaspa', 'hover:bg-[#5bb3a2]', 'text-slate-900');
                    downloadBtn.classList.add('bg-slate-700', 'text-slate-400');
                } else {
                    downloadBtn.classList.remove('bg-slate-700', 'text-slate-400');
                    downloadBtn.classList.add('bg-kaspa', 'hover:bg-[#5bb3a2]', 'text-slate-900');
                }
            }

            downloadBtn.addEventListener('click', () => {
                const img = qrContainer.querySelector('img');
                if (img && img.src) {
                    const link = document.createElement('a');
                    link.href = img.src;
                    link.download = `kaspa-qr-${currentVersion}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            });

            addressInput.addEventListener('input', updateQR);
            amountInput.addEventListener('input', updateQR);
            labelInput.addEventListener('input', updateQR);
        })();
    </script>
</body>
</html>
